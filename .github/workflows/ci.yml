name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      TESTING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check syntax (py_compile)
        run: python -m py_compile app.py main.py config/settings.py

      - name: Lint with ruff
        run: python -m ruff check .

      - name: Verify app imports
        run: |
          TESTING=true python -c "
          import os; os.environ['TESTING']='true'
          import utils.data_persistence as dp; dp._firestore_available = False
          from app import app; print('App import OK')
          "

      - name: Run tests
        run: TESTING=true python -m pytest tests/ -v --tb=long 2>&1 || (echo "--- TESTS FAILED ---" && TESTING=true python -m pytest tests/ -v --tb=long --no-header -q 2>&1; exit 1)

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-autovideo:test .

      - name: Verify container starts
        run: |
          docker run -d --name test-app -p 8080:8080 \
            -e GOOGLE_API_KEY=test -e OPENAI_API_KEY=test \
            ai-autovideo:test
          sleep 3
          curl -f http://localhost:8080/health || (docker logs test-app && exit 1)
          docker stop test-app
