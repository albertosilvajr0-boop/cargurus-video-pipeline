name: Deploy

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/870879946668/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@ai-autovideo.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ai-autovideo \
            --source . \
            --region us-central1 \
            --project ai-autovideo \
            --allow-unauthenticated \
            --memory 1Gi \
            --cpu 2 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 3 \
            --set-env-vars "FLASK_DEBUG=0"

      - name: Deploy Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --project ai-autovideo
